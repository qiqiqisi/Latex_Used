name: One-time branch cleanup

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cleanup-branches.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Delete archived source branches
        run: |
          git push origin --delete \
            High_resolution_spectral_analysis \
            git_learn_report \
            matlab_learn_report \
            system_development_tool_foundation
